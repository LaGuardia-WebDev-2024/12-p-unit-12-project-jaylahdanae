<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>DO YOU KNOW THE QUEEN 🤔🤨?!</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        🎤 whos my favorite artist?
 
        <select id="movie-answer">
          <option value="artist1">Michael Jackson</option>
          <option value="artist2">Beyonce</option>
          <option value="artist3">Tyla</option>
          <option value="artist4">Chris Brown</option>
        </select>
      </label>
      <button type="submit">✅/❌</button>
    </form>
    <div id="movie-result">
      <img  class="artistpicture"
      width="280">

      

      <p id="movie-text"></p>
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        🩰 whats my favorite genre of dance?
        <select id="book-answer">
          <option value="book1">book 1</option>
          <option value="book2">book 2</option>
          <option value="book3">book 3</option>
          <option value="book4">book 4</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "artist1") {
          $("#movie-text").text("Try Again!");
          $(".artistpicture").attr("src","https://media.newyorker.com/photos/5b86ded37b50300447d167eb/master/pass/StFelix-Michael-Jackson.jpg")
         
        } 
        if (answer === "artist2") {
          $("#movie-text").text("YESSSS KINGS & QUEENS");
          $(".artistpicture").attr("src","https://upload.wikimedia.org/wikipedia/commons/b/b7/Beyonc%C3%A9_-_Tottenham_Hotspur_Stadium_-_1st_June_2023_%2810_of_118%29_%2852946364598%29_%28best_crop%29.jpg")
        }
      

        if (answer === "artist3") {
          $("#movie-text").text("NOPE your getting closer");
          $(".artistpicture").attr("src","https://cdn-p.smehost.net/sites/005297e5d91d4996984e966fac4389ea/wp-content/uploads/2025/12/TylaChanel-800x800.png")
         
        }
        if (answer === "artist4") {
          $("#movie-text").text("no.. Want a hint?");
          $(".artistpicture").attr("src","https://www.sandiegouniontribune.com/wp-content/uploads/migration/2012/02/07/00000169-0cec-dbbe-a16f-4eecbfcb0000.jpg?w=535")
         
        }
      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book1") {
          $("#book-text").text("YESSSS!");
         
        } 
        else {
          $("#book-text").text("Try Again!");
        }
      });
      
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
